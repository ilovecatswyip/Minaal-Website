<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minaal ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            background-color: #0a0008;
        }

        .background-container {
            background: 
                radial-gradient(circle at center, rgba(255, 20, 147, 0.25), transparent 60%),
                linear-gradient(rgba(10, 0, 8, 0.4), rgba(10, 0, 8, 0.6)),
                url('background.png') no-repeat center center;
            background-size: cover;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(25, 0, 20, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 20, 147, 0.5);
            text-align: center;
            width: 90%;
            max-width: 400px;
            color: #ffd6f0;
            box-shadow: 
                0 0 30px rgba(255, 20, 147, 0.6),
                0 0 80px rgba(255, 20, 147, 0.3);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #ff1493;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 
                0 0 20px #ff1493,
                0 0 50px rgba(255, 20, 147, 0.7);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #ff66b2;
            text-shadow: 
                0 0 10px #ff4da6,
                0 0 25px #ff1493;
        }

        .bio {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 300;
            color: #ffe6f5;
            opacity: 0.95;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            background: rgba(255, 20, 147, 0.12);
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #ffd6f0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 20, 147, 0.4);
        }

        .link-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(255, 20, 147, 0.3);
            box-shadow: 
                0 0 20px #ff1493,
                0 0 60px rgba(255, 20, 147, 0.7);
        }

        .link-card img {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            object-fit: contain;
        }

        .link-card span {
            font-weight: 500;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

    <div class="background-container">
        <div class="container">
            <img src="minaal.png" alt="Minaal" class="profile-img">
            
            <h1>Minaal ✨</h1>

            <p class="bio">
                Hii I am Minaal, pakistani female gamer!! here are all the socials I own, if you support me do check them out 🫶 and have a great day 🩷🩷🩷.

            <div class="links-container">
                <a href="https://discord.gg/minaal" class="link-card" target="_blank" rel="noopener noreferrer">
                    <img src="discord.png" alt="Discord">
                    <span>Join the Discord</span>
                </a>
                
                <a href="https://instagram.com/minaalheree" class="link-card" target="_blank" rel="noopener noreferrer">
                    <img src="instagram.png" alt="Instagram">
                    <span>Follow on Instagram</span>
                </a>

                <a href="https://www.youtube.com/@minaalheree" class="link-card" target="_blank" rel="noopener noreferrer">
                    <img src="youtube.png" alt="YouTube">
                    <span>Subscribe on YouTube</span>
                </a>

                <a href="https://www.twitch.tv/minaalheree" class="link-card" target="_blank" rel="noopener noreferrer">
                    <img src="twitch.png" alt="Twitch">
                    <span>Watch on Twitch</span>
                </a>

                <a href="https://ko-fi.com/minaal" class="link-card" target="_blank" rel="noopener noreferrer">
                    <img src="ko_fi.png" alt="Ko-fi">
                    <span>Support on Ko-fi</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
